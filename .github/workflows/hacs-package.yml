name: HACS Package & Validate

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-and-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate integration (hassfest)
        uses: home-assistant/actions/hassfest@master

      - name: Build HACS zip package
        run: ./scripts/package_hacs.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qhgas-hacs-package
          path: dist/qhgas.zip

      - name: Upload release asset (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/qhgas.zip
